<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업개발팀 AI 활용 교육 | 한국오지케이</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root{
    --bg-base:#E8EEF5; --text-main:#334155; --text-muted:#64748b;
    --accent:#38bdf8; --ogk-dark:#041527; --ogk-navy:#002D4B; --ogk-cyan:#009AB8; --ogk-lime:#B8D544;
    --glass-bg:rgba(255,255,255,0.45); --glass-inner:rgba(255,255,255,0.62); --glass-inner-h:rgba(255,255,255,0.8);
    --glass-border:rgba(255,255,255,0.8); --glass-shadow:0 16px 40px rgba(15,23,42,0.10); --blur:blur(20px);
    --ok:#5e7d12;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Pretendard','Pretendard Variable',-apple-system,'Segoe UI',sans-serif;
    color:var(--text-main);background:var(--bg-base);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  .bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.6;animation:float 22s infinite ease-in-out alternate}
  .blob-1{width:540px;height:540px;background:var(--ogk-navy);top:-180px;left:-120px}
  .blob-2{width:560px;height:560px;background:var(--ogk-cyan);bottom:-200px;right:-140px;animation-delay:-6s}
  .blob-3{width:420px;height:420px;background:var(--ogk-lime);opacity:.4;top:6%;right:-80px;animation-delay:-12s}
  .blob-4{width:460px;height:460px;background:var(--accent);opacity:.5;bottom:4%;left:-110px;animation-delay:-3s}
  @keyframes float{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.08)}100%{transform:translate(-30px,40px) scale(.96)}}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}
  .glass{background:var(--glass-bg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:30px;box-shadow:var(--glass-shadow)}
  /* topbar */
  .topbar{padding:20px 0 6px}
  .topbar .wrap{display:flex;align-items:center;gap:11px}
  .topbar img{height:30px;width:auto}
  .topbar .b{font-size:13px;font-weight:800;color:var(--ogk-navy)}
  .topbar .b small{display:block;font-size:11px;color:var(--text-muted);font-weight:600}
  /* hero */
  header{padding:14px 0 8px}
  .hero{padding:40px 44px;position:relative;overflow:hidden}
  .tag{display:inline-block;font-size:12px;background:var(--ogk-cyan);color:#fff;padding:5px 13px;border-radius:999px;font-weight:800;letter-spacing:.3px}
  .hero h1{font-size:38px;margin:14px 0 10px;font-weight:800;letter-spacing:-.7px;color:var(--ogk-dark);line-height:1.18}
  .hero p{font-size:15.5px;color:var(--text-main);max-width:640px}
  .progwrap{margin-top:26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pbar{flex:1;min-width:220px;height:14px;border-radius:999px;background:rgba(255,255,255,.55);overflow:hidden;border:1px solid var(--glass-border)}
  .pbar .fl{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--ogk-cyan),var(--ogk-lime));transition:width 1.1s ease}
  .pstat{font-size:13px;font-weight:800;color:var(--ogk-navy)}
  /* timeline */
  .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
  .tl{position:relative;text-align:center;padding-top:26px}
  .tl::before{content:"";position:absolute;top:9px;left:0;right:0;height:3px;background:var(--glass-border)}
  .tl .dot{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:17px;height:17px;border-radius:50%;background:#cdd7e5;border:3px solid #fff;box-shadow:0 0 0 1px var(--glass-border)}
  .tl.done .dot{background:var(--ogk-lime)} .tl.now .dot{background:var(--ogk-cyan);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 1px var(--glass-border)}50%{box-shadow:0 0 0 6px rgba(0,154,184,.25)}}
  .tl .w{font-size:12.5px;font-weight:800;color:var(--ogk-navy)} .tl .dt{font-size:11px;color:var(--text-muted)}
  /* week cards */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:6px}
  .card{display:block;text-decoration:none;color:inherit;background:var(--glass-inner);border:1px solid var(--glass-border);border-radius:24px;padding:26px;transition:.22s;position:relative;overflow:hidden}
  .card.live{cursor:pointer} .card.live:hover{transform:translateY(-5px);background:var(--glass-inner-h);box-shadow:var(--glass-shadow)}
  .card.soon{opacity:.72;cursor:default}
  .card::before{content:"";position:absolute;top:0;left:0;width:6px;height:100%;background:var(--bar,var(--ogk-cyan))}
  .card .hd{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card .num{font-size:13px;font-weight:800;color:var(--ogk-cyan);letter-spacing:.5px}
  .badge{font-size:11px;font-weight:800;padding:4px 11px;border-radius:999px}
  .badge.done{background:rgba(184,213,68,.25);color:var(--ok)}
  .badge.now{background:var(--ogk-cyan);color:#fff}
  .badge.soon{background:rgba(100,116,139,.18);color:var(--text-muted)}
  .card h3{font-size:21px;margin:12px 0 7px;color:var(--ogk-dark);letter-spacing:-.3px}
  .card .ds{font-size:13.5px;color:var(--text-muted);min-height:40px}
  .card .ft{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px dashed rgba(100,116,139,.3)}
  .card .ft .dt{font-size:12.5px;font-weight:700;color:var(--text-muted)}
  .card .go{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;color:var(--ogk-navy)}
  .card.live:hover .go{color:var(--ogk-cyan)}
  .card .go .material-icons-round{font-size:18px}
  /* resources */
  .res{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .rcard{background:var(--glass-inner);border:1px solid var(--glass-border);border-radius:16px;padding:16px;display:flex;gap:12px;align-items:center}
  .rcard .ic{width:40px;height:40px;border-radius:11px;background:rgba(0,154,184,.14);display:flex;align-items:center;justify-content:center;color:var(--ogk-cyan)}
  .rcard .nm{font-size:14px;font-weight:800;color:var(--ogk-navy)} .rcard .sb{font-size:12px;color:var(--text-muted)}
  section{padding:18px 0}
  .shead{display:flex;align-items:center;gap:8px;margin:6px 0 14px}
  .shead .material-icons-round{color:var(--ogk-cyan)}
  .shead h2{font-size:18px;font-weight:800;color:var(--ogk-dark)}
  footer{padding:26px 0 56px}
  footer .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;color:var(--text-muted);font-size:12px}
  footer img{height:22px;opacity:.9}
  footer .ft2{border-left:1px solid var(--glass-border);padding-left:12px}
  @media(max-width:720px){.grid,.timeline{grid-template-columns:1fr 1fr}.hero{padding:28px 24px}.hero h1{font-size:27px}}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>

<script>
const WEEKS=[
 {n:'1주차',t:'AI 입문과 도구 선택',ds:'AI가 뭐고 왜 지금인지, 어떤 일에 어떤 AI를 쓰는지.',dt:'커피챗으로 진행',status:'done',bar:'#B8D544',href:'260624_%5BAI교육%5D1주차_인터랙티브교재_v03.html'},
 {n:'2주차',t:'제대로 물어보기',ds:'같은 일도 묻는 방식에 따라 결과가 갈린다. 프롬프트 7대 패턴 + 빌더.',dt:'오늘 6/24(수) 오후',status:'now',bar:'#009AB8',href:'260624_%5BAI교육%5D2주차_인터랙티브교재_v01.html'},
 {n:'3주차',t:'문서·표·자료 만들기',ds:'보고서·발표자료·메일 초안을 AI로 빠르게 잡는 법.',dt:'7/1(수) 예정',status:'soon',bar:'#64748b',href:''},
 {n:'4주차',t:'내 업무 자동화 맛보기',ds:'반복 업무를 AI에 맡기는 방향 소개 (유료·Cowork).',dt:'추후 예정',status:'soon',bar:'#64748b',href:''},
];
const RES=[
 {ic:'menu_book',nm:'프롬프트 사례집',sb:'7대 패턴 + before/after',href:'260624_%5BAI교육%5D프롬프트사례집_공유본_v01.md'},
 {ic:'event_note',nm:'교육 계획서',sb:'전체 커리큘럼 v03',href:'260624_%5BAI교육%5D교육계획서_v03.md'},
];
const SB={done:'완료',now:'오늘 진행',soon:'예정'};

// progress: 1주차 done + 2주차 진행 → 약 37%
const fl=document.getElementById('fl');
setTimeout(()=>fl.style.width='37%',200);
document.getElementById('pstat').textContent='4주 과정 · 2주차 진행 중';

// timeline
const tlEl=document.getElementById('timeline');
WEEKS.forEach(w=>{
  const d=document.createElement('div');d.className='tl '+(w.status==='done'?'done':w.status==='now'?'now':'');
  d.innerHTML=`<div class="dot"></div><div class="w">${w.n}</div><div class="dt">${w.dt}</div>`;
  tlEl.appendChild(d);
});

// week cards
const grid=document.getElementById('grid');
WEEKS.forEach(w=>{
  const live=w.status!=='soon'&&w.href;
  const el=document.createElement(live?'a':'div');
  el.className='card '+(live?'live':'soon');el.style.setProperty('--bar',w.bar);
  if(live){el.href=w.href;}
  el.innerHTML=`<div class="hd"><span class="num">${w.n}</span><span class="badge ${w.status}">${SB[w.status]}</span></div>
    <h3>${w.t}</h3><div class="ds">${w.ds}</div>
    <div class="ft"><span class="dt">📅 ${w.dt}</span>
      <span class="go">${live?'교재 열기 <span class="material-icons-round">arrow_forward</span>':'준비 중'}</span></div>`;
  grid.appendChild(el);
});

// resources
const resEl=document.getElementById('res');
RES.forEach(r=>{
  const a=document.createElement('a');a.href=r.href;a.className='rcard';a.style.textDecoration='none';
  a.innerHTML=`<div class="ic"><span class="material-icons-round">${r.ic}</span></div>
    <div><div class="nm">${r.nm}</div><div class="sb">${r.sb}</div></div>`;
  resEl.appendChild(a);
});
</script>
